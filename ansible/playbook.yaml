- name: Configure DevOps Server
  hosts: localhost
  become: true

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true
